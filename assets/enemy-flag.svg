<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 28" width="44" height="28">
  <!-- IRONFLAG enemy banner. Replace this file with any SVG/PNG artwork;
       the game auto-scales whatever it finds here. -->
  <defs>
    <linearGradient id="cloth" x1="0" y1="0" x2="1" y2="0.3">
      <stop offset="0" stop-color="#e0503a"/>
      <stop offset="0.55" stop-color="#c8452c"/>
      <stop offset="1" stop-color="#96301d"/>
    </linearGradient>
  </defs>
  <path d="M0,1 L40,3 Q44,7 40,11 L41,17 Q44,21 40,25 L0,27 Z" fill="url(#cloth)"/>
  <path d="M0,1 L40,3 Q44,7 40,11 L41,17 Q44,21 40,25 L0,27 Z" fill="none"
        stroke="#5f1c10" stroke-width="1.4"/>
  <!-- iron cross-hair emblem -->
  <g transform="translate(17,14)">
    <circle r="7.4" fill="none" stroke="#f4e6c8" stroke-width="2"/>
    <line x1="-10" y1="0" x2="-4.5" y2="0" stroke="#f4e6c8" stroke-width="2"/>
    <line x1="4.5" y1="0" x2="10" y2="0" stroke="#f4e6c8" stroke-width="2"/>
    <line x1="0" y1="-10" x2="0" y2="-4.5" stroke="#f4e6c8" stroke-width="2"/>
    <line x1="0" y1="4.5" x2="0" y2="10" stroke="#f4e6c8" stroke-width="2"/>
    <circle r="1.8" fill="#f4e6c8"/>
  </g>
  <!-- battle wear -->
  <path d="M39,4 L36,6 L38,8 Z M40,22 L37,23 L39,25 Z" fill="#7a2416" opacity="0.7"/>
