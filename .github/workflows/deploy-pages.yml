# Publishes the repository root to GitHub Pages on every push to main.
# One-time setup in the repo: Settings → Pages → Source → "GitHub Actions".
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:      # manual "Run workflow" button

permissions:
  contents: read
  pages: write
  id-token: write

# Never let two deploys race; latest push wins.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true   # create/enable the Pages site on first run

      - name: Upload site (repo root — the game is plain static files)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
